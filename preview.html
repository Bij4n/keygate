<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keygate</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#09090b;--bg-2:#0f0f12;--bg-card:#141418;--bg-hover:#1a1a1f;
      --border:rgba(255,255,255,0.06);--border-h:rgba(255,255,255,0.1);
      --text:#f4f4f5;--text-2:#a1a1aa;--text-3:#71717a;--text-4:#52525b;
      --accent:#818cf8;--accent-2:#6366f1;--accent-bg:rgba(99,102,241,0.06);--accent-border:rgba(99,102,241,0.12);
      --green:#34d399;--green-bg:rgba(52,211,153,0.06);--green-border:rgba(52,211,153,0.1);
      --red:#f87171;--red-bg:rgba(248,113,113,0.06);--red-border:rgba(248,113,113,0.1);
      --orange:#fb923c;--orange-bg:rgba(251,146,60,0.06);--orange-border:rgba(251,146,60,0.1);
      --yellow:#facc15;
    }
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:13px}
    input,select,textarea,button{font-family:inherit;font-size:inherit}
    a{color:inherit;text-decoration:none}

    /* Layout */
    .app{display:flex;min-height:100vh}
    .sidebar{width:232px;height:100vh;position:fixed;left:0;top:0;background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 8px;z-index:20;transition:transform .25s cubic-bezier(.4,0,.2,1)}
    .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:0 10px;margin-bottom:24px}
    .logo{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700;letter-spacing:-.03em;cursor:pointer}
    .logo svg{transition:transform .3s}.logo:hover svg{transform:rotate(-8deg) scale(1.08)}
    .nav-section{margin-bottom:16px}
    .nav-label{font-size:10px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.1em;padding:0 10px;margin-bottom:4px}
    .nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:13px;color:var(--text-3);cursor:pointer;transition:all .15s;position:relative}
    .nav-item:hover{color:var(--text-2);background:rgba(255,255,255,.03)}
    .nav-item.active{color:var(--text);background:rgba(255,255,255,.05);font-weight:500}
    .nav-item .badge{margin-left:auto;font-size:10px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:9px;font-weight:600}
    .nav-item .badge.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
    .nav-item .badge.accent{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)}
    .sidebar-footer{margin-top:auto;border-top:1px solid var(--border);padding-top:12px}
    .user-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .15s}
    .user-card:hover{background:rgba(255,255,255,.03)}
    .avatar{width:28px;height:28px;border-radius:7px;background:var(--accent-2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0}
    .user-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-meta{font-size:10px;color:var(--text-4)}

    /* Mobile nav */
    .mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg-2);border-bottom:1px solid var(--border);z-index:15;padding:0 16px;align-items:center;justify-content:space-between}
    .hamburger{background:none;border:none;color:var(--text);cursor:pointer;padding:8px}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:18}
    .overlay.show{display:block}

    /* Main content */
    main{flex:1;margin-left:232px;padding:24px 28px;min-height:100vh}
    .page-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
    .page-title{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px}
    .page-desc{font-size:13px;color:var(--text-3)}

    /* Alert banner */
    .alert-banner{background:var(--red-bg);border:1px solid var(--red-border);border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;animation:fadeIn .4s}
    .alert-banner .alert-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .alert-banner-text{flex:1;font-size:13px;color:var(--red)}
    .alert-banner-text strong{font-weight:600}
    .alert-banner-action{font-size:12px;color:var(--red);font-weight:600;cursor:pointer;white-space:nowrap;padding:4px 10px;border:1px solid var(--red-border);border-radius:6px;background:transparent;transition:background .15s}
    .alert-banner-action:hover{background:var(--red-bg)}

    /* Stats grid */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
    .stat{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s}
    .stat:hover{border-color:var(--border-h)}
    .stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .stat-label{font-size:11px;color:var(--text-4);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
    .stat-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
    .stat-value{font-size:24px;font-weight:700;letter-spacing:-.02em}
    .stat-change{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:3px}
    .stat-change.up{color:var(--green)}.stat-change.down{color:var(--red)}.stat-change.neutral{color:var(--text-4)}

    /* Cards */
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
    .card:hover{border-color:var(--border-h)}
    .card-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .card-head h2{font-size:13px;font-weight:600}
    .card-body{padding:16px}
    .card-empty{padding:40px 20px;text-align:center;color:var(--text-4)}
    .card-empty p:first-child{font-size:13px;color:var(--text-3);margin-bottom:4px}
    .card-empty p:last-child{font-size:12px}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
    .btn-sm{padding:5px 9px;font-size:11px;border-radius:6px}
    .btn-primary{background:var(--accent-2);color:white}.btn-primary:hover{background:var(--accent)}
    .btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--border-h);color:var(--text)}
    .btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-border)}.btn-danger:hover{background:var(--red-bg)}
    .btn-success{background:transparent;color:var(--green);border:1px solid var(--green-border)}.btn-success:hover{background:var(--green-bg)}

    /* Tables */
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:8px 14px;color:var(--text-4);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
    td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text-2);font-size:13px}
    tr:last-child td{border-bottom:none}
    th:last-child,td:last-child{text-align:right}
    tr:hover td{background:rgba(255,255,255,.01)}

    /* Tags */
    .tag{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.02em}
    .t-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
    .t-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
    .t-orange{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
    .t-accent{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)}
    .t-gray{background:rgba(255,255,255,.03);color:var(--text-3);border:1px solid var(--border)}
    .code{font-family:'SF Mono','Fira Code',monospace;font-size:11px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text-2)}

    /* Trust bar */
    .trust{display:flex;align-items:center;gap:6px}
    .trust-num{font-size:12px;font-weight:600;min-width:20px}
    .trust-bar{flex:1;max-width:48px;height:5px;border-radius:3px;background:rgba(255,255,255,.04);overflow:hidden}
    .trust-fill{height:100%;border-radius:3px;transition:width .5s}

    /* Connection cards */
    .conn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
    .conn{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:all .25s}
    .conn:hover{border-color:var(--border-h);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
    .conn-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .conn-info{display:flex;align-items:center;gap:9px}
    .conn-icon{width:34px;height:34px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:17px}
    .conn-name{font-weight:600;font-size:13px}
    .conn-status{font-size:10px;display:flex;align-items:center;gap:4px}
    .dot{width:5px;height:5px;border-radius:50%;display:inline-block}
    .conn-scopes{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px}
    .conn-foot{display:flex;gap:6px}
    .conn-foot .btn{flex:1;justify-content:center}

    /* Filter bar */
    .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .filter-input{padding:7px 11px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none;min-width:180px;transition:border-color .2s}
    .filter-input:focus{border-color:var(--accent-border)}
    .filter-input::placeholder{color:var(--text-4)}
    .filter-select{padding:7px 11px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text-2);font-size:12px;outline:none;appearance:none;cursor:pointer}

    /* Tabs */
    .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
    .tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
    .tab:hover{color:var(--text-2)}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* Activity chart (CSS-only bar chart) */
    .chart{display:flex;align-items:flex-end;gap:3px;height:80px;padding:0 4px}
    .chart-bar{flex:1;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:3px 3px 0 0;min-width:8px;transition:all .3s;position:relative;cursor:default}
    .chart-bar:hover{background:rgba(99,102,241,.15)}
    .chart-bar:hover::after{content:attr(data-val);position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--accent);font-weight:600;white-space:nowrap}
    .chart-labels{display:flex;gap:3px;padding:4px 4px 0;font-size:9px;color:var(--text-4)}
    .chart-labels span{flex:1;text-align:center}

    /* Modals */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s}
    .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:480px;max-height:85vh;overflow-y:auto}
    .modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .modal-item{display:flex;align-items:center;gap:8px;padding:10px;border:1px solid var(--border);border-radius:7px;cursor:pointer;background:transparent;color:var(--text);font-size:12px;font-weight:500;transition:all .15s}
    .modal-item:hover{border-color:var(--accent-border);background:var(--accent-bg)}
    .form-group{margin-bottom:12px}
    .form-label{display:block;font-size:11px;color:var(--text-3);margin-bottom:4px;font-weight:500}
    .form-input{width:100%;padding:8px 11px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--accent-border)}
    .form-select{width:100%;padding:8px 11px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none;appearance:none}
    .form-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);padding:3px 0;cursor:pointer}
    .form-check input{accent-color:var(--accent-2)}

    /* Onboarding checklist */
    .checklist{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:10px;padding:16px;margin-bottom:20px}
    .checklist-title{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .checklist-items{display:flex;flex-direction:column;gap:6px}
    .check-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-2);padding:6px 10px;border-radius:6px;cursor:pointer;transition:background .15s}
    .check-item:hover{background:rgba(255,255,255,.03)}
    .check-item.done{color:var(--text-4);text-decoration:line-through}
    .check-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px}
    .check-item.done .check-dot{border-color:var(--green);background:var(--green-bg);color:var(--green)}
    .checklist-progress{height:3px;border-radius:2px;background:rgba(255,255,255,.06);margin-top:10px;overflow:hidden}
    .checklist-fill{height:100%;background:var(--accent-2);border-radius:2px;transition:width .5s}

    /* Login */
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
    .login-box{width:100%;max-width:360px;padding:32px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px}
    .login-logo{display:flex;align-items:center;gap:7px;justify-content:center;margin-bottom:24px;font-size:20px;font-weight:700}
    .login-title{font-size:16px;font-weight:600;text-align:center;margin-bottom:4px}
    .login-sub{font-size:12px;color:var(--text-3);text-align:center;margin-bottom:20px}
    .err{padding:8px 12px;border-radius:7px;background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);font-size:11px;margin-bottom:12px}

    /* Responsive */
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .mobile-header{display:flex}
      main{margin-left:0;padding:68px 16px 16px}
      .stats{grid-template-columns:1fr 1fr}
      .conn-grid{grid-template-columns:1fr}
      .modal-grid{grid-template-columns:1fr}
      .filters{flex-direction:column}
      .filter-input,.filter-select{min-width:0;width:100%}
      .chart{height:60px}
      .page-top{flex-direction:column;gap:12px}
      .page-top .btn{width:100%}
    }
  </style>
</head>

    {id:'al1',type:'anomaly',severity:'critical',title:'Suspicious Agent Blocked',message:'Agent "data-scraper-v2" attempted to access Slack and Gmail credentials 3 times in 4 minutes after being denied GitHub access at 11:10 PM. Pattern consistent with credential probing. Agent has been auto-suspended.',agentId:'data-scraper-v2',acknowledged:false,createdAt:'2026-03-26T09:42:00Z'},
    {id:'al2',type:'anomaly',severity:'medium',title:'Off-Hours Access Attempt',message:'Agent "data-scraper-v2" requested GitHub credentials at 11:10 PM, outside configured business hours. Token was issued but flagged for review.',agentId:'data-scraper-v2',acknowledged:true,createdAt:'2026-03-25T23:10:00Z'},
  ],
  // 7-day activity data for chart
  chartData:[8,12,15,11,23,18,23],
  chartLabels:['Thu','Fri','Sat','Sun','Mon','Tue','Today'],

let S={
  token:localStorage.getItem('kg_token'),
  user:JSON.parse(localStorage.getItem('kg_user')||'null')||D.user,
  page:'dashboard',connections:D.connections,audit:D.audit,summary:D.summary,
  agents:D.agents,policies:D.policies,alerts:D.alerts,
  modal:null,tokenResult:null,mobileOpen:false,
  auditFilter:'',auditType:'all',integrationTab:'webhooks',
  webhooks:[{id:'wh1',url:'https://hooks.slack.com/services/T00/B00/xxx',format:'slack',events:['anomaly.detected','token.denied'],enabled:true}],
  siemIntegrations:[{id:'s1',type:'datadog',endpoint:'https://http-intake.logs.datadoghq.com/v1/input',enabled:true}],
  demoMode:!localStorage.getItem('kg_token'),
  onboarding:{connectService:true,registerAgent:true,createPolicy:true,configureWebhook:true,reviewAudit:false}
};

function ft(t){const d=Date.now()-new Date(t).getTime(),m=Math.floor(d/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';const dy=Math.floor(h/24);return dy+'d ago'}
function pn(p){return p.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
function tc(s){return s>=75?'var(--green)':s>=40?'var(--orange)':'var(--red)'}

// Actions (all work in demo mode)
function addConn(p){S.connections.push({id:'conn_'+Date.now(),provider:p,status:'active',scopes:PS[p]||['read'],lastUsedAt:null});S.summary.activeConnections++;S.modal=null;render()}
function delConn(id){if(!confirm('Revoke this connection and all its tokens?'))return;S.connections=S.connections.filter(c=>c.id!==id);S.summary.activeConnections--;render()}
function issueToken(cid){const c=S.connections.find(x=>x.id===cid);S.tokenResult={tokenId:'tok_'+Math.random().toString(36).slice(2,10),reference:'ref_'+Math.random().toString(36).slice(2,18),expiresAt:new Date(Date.now()+3600000).toISOString(),scopes:[{resource:'data',actions:['read']}]};S.audit.unshift({id:'a_'+Date.now(),timestamp:new Date().toISOString(),action:'token.issued',agentId:'manual',provider:c?.provider||'custom',connectionId:cid,success:true});S.summary.tokensIssued++;S.modal='token';render()}
function regAgent(n,d){S.agents.push({id:'ag_'+Date.now(),name:n,description:d||'',status:'active',trustScore:50,stats:{totalTokensIssued:0,totalRequests:0,failedRequests:0,anomaliesDetected:0},lastActiveAt:null});S.modal=null;render()}
function suspendAgent(id){const a=S.agents.find(x=>x.id===id);if(a)a.status='suspended';render()}
function activateAgent(id){const a=S.agents.find(x=>x.id===id);if(a)a.status='active';render()}
function addPolicy(n,eff,conds){S.policies.push({id:'p_'+Date.now(),name:n,description:'',effect:eff,conditions:conds});S.modal=null;render()}
function delPolicy(id){S.policies=S.policies.filter(p=>p.id!==id);render()}
function ackAlert(id){const a=S.alerts.find(x=>x.id===id);if(a)a.acknowledged=true;render()}
function addWebhook(url,fmt,evts){S.webhooks.push({id:'wh_'+Date.now(),url,format:fmt,events:evts,enabled:true});S.modal=null;render()}
function delWebhook(id){S.webhooks=S.webhooks.filter(w=>w.id!==id);render()}
function genApiKey(n){S.tokenResult={key:'kg_key_'+Math.random().toString(36).slice(2,30),name:n};S.modal='apikey';render()}
function nav(p){S.page=p;S.mobileOpen=false;render()}
function toggleMobile(){S.mobileOpen=!S.mobileOpen;render()}

function renderNav(){
  const unack=S.alerts.filter(a=>!a.acknowledged).length;
  const items=[
    {section:'Overview',items:[
      {icon:'📊',label:'Dashboard',page:'dashboard'},
    ]},
    {section:'Manage',items:[
      {icon:'🤖',label:'Agents',page:'agents',badge:S.agents.length},
      {icon:'🔗',label:'Connections',page:'connections'},
      {icon:'📋',label:'Policies',page:'policies'},
    ]},
    {section:'Monitor',items:[
      {icon:'📜',label:'Audit & Alerts',page:'audit',badge:unack,badgeType:'red'},
    ]},
    {section:'Configure',items:[
      {icon:'🔌',label:'Integrations',page:'integrations'},
      {icon:'⚙️',label:'Settings',page:'settings'},
    ]},
  ];

}

function renderDashboard(){
  const s=S.summary;const unack=S.alerts.filter(a=>!a.acknowledged);
  const checkDone=Object.values(S.onboarding).filter(v=>v).length;
  const checkTotal=Object.keys(S.onboarding).length;
  const maxBar=Math.max(...D.chartData);

  let alertBanner='';
  if(unack.length>0){
    const a=unack[0];
    alertBanner=`<div class="alert-banner"><div class="alert-dot"></div><div class="alert-banner-text"><strong>${a.title}:</strong> ${a.message.slice(0,120)}...</div><button class="alert-banner-action" onclick="nav('audit')">View Details</button></div>`;
  }

  const checklist=checkDone<checkTotal?`<div class="checklist"><div class="checklist-title">🚀 Getting Started <span style="color:var(--text-4);font-weight:400;font-size:11px">${checkDone}/${checkTotal} complete</span></div><div class="checklist-items">
    <div class="check-item${S.onboarding.connectService?' done':''}" onclick="nav('connections')"><div class="check-dot">${S.onboarding.connectService?'✓':''}</div>Connect your first service</div>
    <div class="check-item${S.onboarding.registerAgent?' done':''}" onclick="nav('agents')"><div class="check-dot">${S.onboarding.registerAgent?'✓':''}</div>Register an agent</div>
    <div class="check-item${S.onboarding.createPolicy?' done':''}" onclick="nav('policies')"><div class="check-dot">${S.onboarding.createPolicy?'✓':''}</div>Create a security policy</div>
    <div class="check-item${S.onboarding.configureWebhook?' done':''}" onclick="nav('integrations')"><div class="check-dot">${S.onboarding.configureWebhook?'✓':''}</div>Configure alert notifications</div>
    <div class="check-item${S.onboarding.reviewAudit?'done':''}" onclick="nav('audit')"><div class="check-dot">${S.onboarding.reviewAudit?'✓':''}</div>Review your audit log</div>
  </div><div class="checklist-progress"><div class="checklist-fill" style="width:${(checkDone/checkTotal)*100}%"></div></div></div>`:'';

  return`${alertBanner}${checklist}
    <div class="stats">
      <div class="stat"><div class="stat-top"><span class="stat-label">Connections</span><div class="stat-icon" style="background:var(--accent-bg);color:var(--accent)">🔗</div></div><div class="stat-value">${s.activeConnections}</div><div class="stat-change neutral">across ${S.connections.length} total</div></div>
      <div class="stat"><div class="stat-top"><span class="stat-label">Tokens (24h)</span><div class="stat-icon" style="background:var(--green-bg);color:var(--green)">🔑</div></div><div class="stat-value">${s.last24h.requests}</div><div class="stat-change up">↑ ${s.last24h.uniqueAgents} agents active</div></div>
      <div class="stat"><div class="stat-top"><span class="stat-label">Total Issued</span><div class="stat-icon" style="background:var(--accent-bg);color:var(--accent)">📊</div></div><div class="stat-value">${s.tokensIssued}</div><div class="stat-change neutral">${s.tokensRevoked} revoked</div></div>
      <div class="stat"><div class="stat-top"><span class="stat-label">Anomalies</span><div class="stat-icon" style="background:${s.anomalies>0?'var(--red-bg)':'var(--green-bg)'};color:${s.anomalies>0?'var(--red)':'var(--green)'}">⚠️</div></div><div class="stat-value" style="color:${s.anomalies>0?'var(--red)':'inherit'}">${s.anomalies}</div><div class="stat-change ${s.anomalies>0?'down':'neutral'}">${unack.length} unacknowledged</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="card"><div class="card-head"><h2>Activity (7 days)</h2><span style="font-size:11px;color:var(--text-4)">${s.tokensIssued} total requests</span></div><div class="card-body">
        <div class="chart">${D.chartData.map((v,i)=>`<div class="chart-bar" style="height:${(v/maxBar)*100}%" data-val="${v}"></div>`).join('')}</div>
        <div class="chart-labels">${D.chartLabels.map(l=>`<span>${l}</span>`).join('')}</div>
      </div></div>
      <div class="card"><div class="card-head"><h2>Agent Trust</h2><button class="btn btn-sm btn-ghost" onclick="nav('agents')">View All</button></div>
        <table><tbody>${S.agents.slice(0,4).map(a=>`<tr><td style="font-weight:500">${a.name}</td><td><span class="tag ${a.status==='active'?'t-green':'t-red'}">${a.status}</span></td><td><div class="trust"><span class="trust-num" style="color:${tc(a.trustScore)}">${a.trustScore}</span><div class="trust-bar"><div class="trust-fill" style="width:${a.trustScore}%;background:${tc(a.trustScore)}"></div></div></div></td></tr>`).join('')}</tbody></table>
      </div>
    </div>
    <div class="card"><div class="card-head"><h2>Recent Activity</h2><button class="btn btn-sm btn-ghost" onclick="nav('audit')">View All</button></div>
      <table><thead><tr><th>Event</th><th>Agent</th><th>Service</th><th>Status</th><th>Time</th></tr></thead><tbody>
      ${S.audit.slice(0,6).map(e=>{const[c,l]=AC[e.action]||['var(--text-3)','Unknown'];return`<tr><td style="color:${c};font-weight:500">${l}</td><td><span class="code">${e.agentId}</span></td><td>${pn(e.provider)}</td><td><span class="tag ${e.success?'t-green':'t-red'}">${e.success?'OK':'Denied'}</span></td><td style="color:var(--text-4)">${ft(e.timestamp)}</td></tr>`}).join('')}
      </tbody></table>
    </div>`;
}

function renderAgents(){
  return`<div class="page-top"><div><div class="page-title">Agents</div><div class="page-desc">Manage registered agent identities and trust scores</div></div><button class="btn btn-primary" onclick="S.modal='agent';render()">+ Register Agent</button></div>

    '<div class="card"><table><thead><tr><th>Agent</th><th>Status</th><th>Trust</th><th>Requests</th><th>Failed</th><th>Last Active</th><th>Actions</th></tr></thead><tbody>'+
    S.agents.map(a=>`<tr><td><div style="font-weight:500">${a.name}</div><div style="font-size:11px;color:var(--text-4);margin-top:1px">${a.description}</div></td>
      <td><span class="tag ${a.status==='active'?'t-green':'t-red'}">${a.status}</span></td>
      <td><div class="trust"><span class="trust-num" style="color:${tc(a.trustScore)}">${a.trustScore}</span><div class="trust-bar"><div class="trust-fill" style="width:${a.trustScore}%;background:${tc(a.trustScore)}"></div></div></div></td>
      <td>${a.stats.totalRequests}</td><td style="color:${a.stats.failedRequests>0?'var(--red)':'inherit'}">${a.stats.failedRequests}</td>

function renderConnections(){
  return`<div class="page-top"><div><div class="page-title">Connections</div><div class="page-desc">Manage OAuth connections to external services</div></div><button class="btn btn-primary" onclick="S.modal='connect';render()">+ Connect Service</button></div>
    ${S.connections.length===0?'<div class="card"><div class="card-empty"><p>No connections yet</p><p>Connect your first service to start issuing scoped credentials to your agents.</p></div></div>':
    '<div class="conn-grid">'+S.connections.map(c=>{const sc=c.status==='active'?'var(--green)':c.status==='expired'?'var(--orange)':'var(--red)';
      return`<div class="conn"><div class="conn-top"><div class="conn-info"><div class="conn-icon">${IC[c.provider]||'🔧'}</div><div><div class="conn-name">${pn(c.provider)}</div><div class="conn-status" style="color:${sc}"><span class="dot" style="background:${sc}"></span>${c.status}</div></div></div></div>
        <div class="conn-scopes">${c.scopes.map(s=>`<span class="tag t-gray">${s}</span>`).join('')}</div>
        <div style="font-size:11px;color:var(--text-4);margin-bottom:8px">${c.lastUsedAt?'Last used '+ft(c.lastUsedAt):'Never used'}</div>

function renderPolicies(){
  const efTag=e=>e==='deny'?'t-red':'t-orange';
  return`<div class="page-top"><div><div class="page-title">Policies</div><div class="page-desc">Define access control rules for your agents</div></div><button class="btn btn-primary" onclick="S.modal='policy';render()">+ Create Policy</button></div>
    ${S.policies.length===0?'<div class="card"><div class="card-empty"><p>No policies defined</p><p>Create a policy to restrict when and how agents can access credentials.</p></div></div>':

      <td><span class="tag ${efTag(p.effect)}">${p.effect}</span></td>

      <td><button class="btn btn-sm btn-danger" onclick="delPolicy('${p.id}')">Delete</button></td></tr>`).join('')+'</tbody></table></div>'}`;
}

function renderAudit(){
  const unack=S.alerts.filter(a=>!a.acknowledged);
  let filtered=S.audit;
  if(S.auditFilter)filtered=filtered.filter(e=>e.agentId.includes(S.auditFilter)||e.provider.includes(S.auditFilter)||e.action.includes(S.auditFilter));
  if(S.auditType!=='all')filtered=filtered.filter(e=>S.auditType==='denied'?!e.success:e.action===S.auditType);

  return`<div class="page-top"><div><div class="page-title">Audit & Alerts</div><div class="page-desc">Complete history of credential access events</div></div><button class="btn btn-ghost" onclick="alert('Export coming soon')">Export CSV</button></div>
    ${unack.length>0?'<div style="margin-bottom:16px">'+unack.map(a=>`<div class="alert-banner" style="margin-bottom:8px"><div class="alert-dot"></div><div class="alert-banner-text"><strong>${a.title}</strong><br><span style="color:var(--text-2);font-size:12px">${a.message}</span></div><button class="alert-banner-action" onclick="ackAlert('${a.id}')">Acknowledge</button></div>`).join('')+'</div>':''}
    <div class="filters">
      <input class="filter-input" placeholder="Search by agent, provider, or action..." value="${S.auditFilter}" oninput="S.auditFilter=this.value;render()">
      <select class="filter-select" onchange="S.auditType=this.value;render()">
        <option value="all"${S.auditType==='all'?' selected':''}>All events</option>
        <option value="token.issued"${S.auditType==='token.issued'?' selected':''}>Issued</option>
        <option value="token.resolved"${S.auditType==='token.resolved'?' selected':''}>Resolved</option>
        <option value="denied"${S.auditType==='denied'?' selected':''}>Denied</option>
        <option value="token.revoked"${S.auditType==='token.revoked'?' selected':''}>Revoked</option>
      </select>
      <span style="font-size:11px;color:var(--text-4);padding:8px 0">${filtered.length} events</span>
    </div>
    <div class="card"><table><thead><tr><th>Event</th><th>Agent</th><th>Service</th><th>Connection</th><th>Status</th><th>Time</th></tr></thead><tbody>
    ${filtered.map(e=>{const[c,l]=AC[e.action]||['var(--text-3)','Unknown'];return`<tr><td style="color:${c};font-weight:500">${l}</td><td><span class="code">${e.agentId}</span></td><td>${pn(e.provider)}</td><td style="font-size:11px;color:var(--text-4)">${e.connectionId.slice(0,12)}</td><td><span class="tag ${e.success?'t-green':'t-red'}">${e.success?'OK':'Denied'}</span></td><td style="color:var(--text-4)">${ft(e.timestamp)}</td></tr>`}).join('')}
    </tbody></table></div>`;
}

    </tbody></table></div>`;
}

function renderTemplatesTab(){
  const at=[{i:'💻',n:'Coding Assistant',d:'GitHub, Jira · read/write · 1h TTL'},{i:'📧',n:'Email Assistant',d:'Gmail, Calendar · read-only · 30m TTL'},{i:'📊',n:'Sales Agent',d:'Salesforce, HubSpot, Slack · read/write'},{i:'🔧',n:'DevOps Agent',d:'GitHub · read-only · approval required'},{i:'🔍',n:'Research Agent',d:'Drive, Notion · read-only · 2h TTL'},{i:'📈',n:'Data Analyst',d:'Drive, Notion · read/write · 2h TTL'}];
  const pt=[{n:'No Write After Hours',e:'deny'},{n:'Approve All Deletes',e:'approval'},{n:'Block Payment Providers',e:'deny'},{n:'Max 1h Token TTL',e:'deny'},{n:'Read-Only Default',e:'deny'},{n:'Approve Slack Posts',e:'approval'}];
  return`<div style="margin-bottom:16px"><h3 style="font-size:13px;font-weight:600;margin-bottom:10px">Agent Role Templates</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
    ${at.map(t=>`<div class="stat" style="cursor:pointer"><div style="font-size:20px;margin-bottom:6px">${t.i}</div><div style="font-weight:600;font-size:12px;margin-bottom:2px">${t.n}</div><div style="font-size:10px;color:var(--text-4);line-height:1.4">${t.d}</div></div>`).join('')}
    </div></div>
    <h3 style="font-size:13px;font-weight:600;margin-bottom:10px">Policy Templates</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
    ${pt.map(p=>`<div class="stat" style="cursor:pointer"><div style="font-weight:500;font-size:12px;margin-bottom:4px">${p.n}</div><span class="tag ${p.e==='deny'?'t-red':'t-orange'}" style="font-size:9px">${p.e}</span></div>`).join('')}
    </div>`;
}

function renderSettings(){
  const u=S.user;
  return`<div class="page-top"><div><div class="page-title">Settings</div><div class="page-desc">Manage your account, API keys, and team</div></div></div>
    <div style="display:grid;gap:12px">
      <div class="card"><div class="card-head"><h2>Profile</h2></div><div class="card-body">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div class="avatar" style="width:42px;height:42px;font-size:15px;border-radius:10px">${(u.name||u.email).slice(0,2).toUpperCase()}</div>
          <div><div style="font-weight:600;font-size:14px">${u.name||u.email}</div><div style="font-size:12px;color:var(--text-4)">${u.email}</div></div>
        </div>
        <div style="font-size:12px;color:var(--text-3)">Role: <span class="tag t-accent">${u.role}</span></div>
      </div></div>
      <div class="card"><div class="card-head"><h2>API Keys</h2><button class="btn btn-sm btn-primary" onclick="S.modal='genkey';render()">+ Generate Key</button></div><div class="card-body">
        <p style="font-size:12px;color:var(--text-3)">API keys allow agents and the SDK to authenticate with Keygate. Keys are shown only once at creation.</p>
      </div></div>
      <div class="card"><div class="card-head"><h2>Team</h2></div><div class="card-body">
        <p style="font-size:12px;color:var(--text-3)">Invite team members to collaborate on credential governance. Members can manage connections and view audit logs.</p>
        <button class="btn btn-sm btn-ghost" style="margin-top:10px" onclick="alert('Team invites coming soon')">+ Invite Member</button>
      </div></div>
    </div>`;
}

function renderModal(){
  if(!S.modal)return'';
  const close=`onclick="if(event.target===this){S.modal=null;render()}"`;
  if(S.modal==='connect'){
    const provs=['github','gmail','slack','notion','google_drive','calendar','jira','salesforce','hubspot','stripe'];
    return`<div class="modal-bg" ${close}><div class="modal"><h3>Connect a Service</h3><p style="font-size:12px;color:var(--text-3);margin-bottom:14px">Select a service to create an OAuth connection. Your agents will access it through scoped tokens.</p><div class="modal-grid">${provs.map(p=>`<button class="modal-item" onclick="addConn('${p}')"><span style="font-size:16px">${IC[p]}</span>${pn(p)}</button>`).join('')}</div></div></div>`;
  }
  if(S.modal==='agent'){
    return`<div class="modal-bg" ${close}><div class="modal"><h3>Register Agent</h3><p style="font-size:12px;color:var(--text-3);margin-bottom:14px">Give your agent a verified identity. Agents build trust scores over time based on their behavior.</p><form onsubmit="event.preventDefault();regAgent(this.n.value,this.d.value)">
      <div class="form-group"><label class="form-label">Agent Name</label><input class="form-input" name="n" placeholder="e.g., pr-reviewer" required></div>
      <div class="form-group"><label class="form-label">Description</label><input class="form-input" name="d" placeholder="What does this agent do?"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px">Register Agent</button>
    </form></div></div>`;
  }
  if(S.modal==='policy'){
    return`<div class="modal-bg" ${close}><div class="modal"><h3>Create Policy</h3><p style="font-size:12px;color:var(--text-3);margin-bottom:14px">Define a rule that controls when and how agents can access credentials.</p><form onsubmit="event.preventDefault();const cs=[];const ct=this.ct.value;if(ct==='scope_action')cs.push({type:'scope_action',actions:[this.cv.value]});if(ct==='provider')cs.push({type:'provider',providers:[this.cv.value]});addPolicy(this.n.value,this.eff.value,cs)">
      <div class="form-group"><label class="form-label">Policy Name</label><input class="form-input" name="n" placeholder="e.g., No write after hours" required></div>
      <div class="form-group"><label class="form-label">Effect</label><select class="form-select" name="eff"><option value="deny">Deny</option><option value="require_approval">Require Approval</option></select></div>
      <div class="form-group"><label class="form-label">Condition Type</label><select class="form-select" name="ct"><option value="scope_action">Action (read/write/delete)</option><option value="provider">Provider</option></select></div>
      <div class="form-group"><label class="form-label">Value</label><input class="form-input" name="cv" placeholder="e.g., write, delete, slack, stripe" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px">Create Policy</button>
    </form></div></div>`;
  }
  if(S.modal==='webhook'){
    return`<div class="modal-bg" ${close}><div class="modal"><h3>Add Webhook</h3><p style="font-size:12px;color:var(--text-3);margin-bottom:14px">Receive notifications when security events occur.</p><form onsubmit="event.preventDefault();const evts=[];this.querySelectorAll('.whe:checked').forEach(c=>evts.push(c.value));addWebhook(this.url.value,this.fmt.value,evts)">
      <div class="form-group"><label class="form-label">Webhook URL</label><input class="form-input" name="url" type="url" placeholder="https://hooks.slack.com/services/..." required></div>
      <div class="form-group"><label class="form-label">Format</label><select class="form-select" name="fmt"><option value="slack">Slack</option><option value="discord">Discord</option><option value="json">JSON</option></select></div>
      <div class="form-group"><label class="form-label">Events</label>
        <label class="form-check"><input type="checkbox" class="whe" value="anomaly.detected" checked> Anomaly detected</label>
        <label class="form-check"><input type="checkbox" class="whe" value="token.denied" checked> Token denied</label>
        <label class="form-check"><input type="checkbox" class="whe" value="agent.suspended"> Agent suspended</label>
        <label class="form-check"><input type="checkbox" class="whe" value="token.revoked"> Token revoked</label>
        <label class="form-check"><input type="checkbox" class="whe" value="connection.revoked"> Connection revoked</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px">Add Webhook</button>
    </form></div></div>`;
  }
  if(S.modal==='siem'){
    const t=S.siemType||'datadog';const labels={datadog:'Datadog',splunk:'Splunk',elastic:'Elasticsearch',syslog:'Syslog',webhook:'Webhook'};
    return`<div class="modal-bg" ${close}><div class="modal"><h3>Connect ${labels[t]||t}</h3><form onsubmit="event.preventDefault();S.siemIntegrations.push({id:'s_'+Date.now(),type:'${t}',endpoint:this.ep.value,enabled:true});S.modal=null;render()">
      <div class="form-group"><label class="form-label">Endpoint URL</label><input class="form-input" name="ep" type="url" placeholder="https://..." required></div>
      <div class="form-group"><label class="form-label">API Key (optional)</label><input class="form-input" name="key" type="password" placeholder="Your ${labels[t]||''} API key"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px">Connect</button>
    </form></div></div>`;
  }
  if(S.modal==='token'&&S.tokenResult){
    return`<div class="modal-bg" ${close}><div class="modal"><h3>Token Issued</h3><p style="font-size:12px;color:var(--text-3);margin-bottom:12px">A scoped, time-limited credential has been created. Use the reference to resolve it.</p><div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px"><pre style="font-size:11px;color:var(--text-2);white-space:pre-wrap;word-break:break-all;margin:0;font-family:'SF Mono',monospace">${JSON.stringify(S.tokenResult,null,2)}</pre></div><p style="font-size:10px;color:var(--text-4);margin-top:8px">Expires: ${new Date(S.tokenResult.expiresAt).toLocaleString()}</p></div></div>`;
  }
  if(S.modal==='apikey'&&S.tokenResult){
    return`<div class="modal-bg" ${close}><div class="modal"><h3>API Key Created</h3><p style="font-size:12px;color:var(--text-3);margin-bottom:12px">Copy this key now — it won't be shown again.</p><div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px"><code style="font-size:12px;color:var(--green);word-break:break-all;font-family:'SF Mono',monospace">${S.tokenResult.key}</code></div></div></div>`;
  }
  if(S.modal==='genkey'){
    return`<div class="modal-bg" ${close}><div class="modal"><h3>Generate API Key</h3><p style="font-size:12px;color:var(--text-3);margin-bottom:14px">API keys authenticate agents and SDKs with Keygate.</p><form onsubmit="event.preventDefault();genApiKey(this.n.value)">
      <div class="form-group"><label class="form-label">Key Name</label><input class="form-input" name="n" placeholder="e.g., production-agent" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px">Generate Key</button>
    </form></div></div>`;
  }
  return'';
}

function render(){
  if(!S.token&&!S.demoMode){renderLogin();return}
  if(!S.user)S.user=D.user;
  const u=S.user;const initials=(u.name||u.email).slice(0,2).toUpperCase();
  const pages={dashboard:renderDashboard,agents:renderAgents,connections:renderConnections,policies:renderPolicies,audit:renderAudit,integrations:renderIntegrations,settings:renderSettings};
  const content=(pages[S.page]||renderDashboard)();
  const pageTitle=S.page==='dashboard'?'Dashboard':S.page.charAt(0).toUpperCase()+S.page.slice(1);

  document.getElementById('app').innerHTML=`
    <div class="mobile-header">
      <button class="hamburger" onclick="toggleMobile()">☰</button>
      <div class="logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Keygate</div>
      <div style="width:32px"></div>
    </div>
    <div class="overlay${S.mobileOpen?' show':''}" onclick="S.mobileOpen=false;render()"></div>
    <div class="app">
      <aside class="sidebar${S.mobileOpen?' open':''}">
        <div class="sidebar-header">
          <div class="logo" onclick="nav('dashboard')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Keygate</div>
          ${S.demoMode?'<span class="tag t-orange" style="font-size:9px">Demo</span>':''}
        </div>
        ${renderNav()}
        <div style="padding:4px 10px;margin-bottom:8px"><a href="/docs.html" style="font-size:11px;color:var(--text-4);display:flex;align-items:center;gap:5px">📖 Documentation</a></div>
        <div class="sidebar-footer">
          <div class="user-card"><div class="avatar">${initials}</div><div><div class="user-name">${u.name||u.email}</div><div class="user-meta">${u.role}</div></div></div>
        </div>
      </aside>
      <main>
        ${S.page==='dashboard'?'<div class="page-top"><div><div class="page-title">Dashboard</div><div class="page-desc">Credential governance overview</div></div></div>':''}
        ${content}
      </main>
    </div>
    ${renderModal()}`;
}

function renderLogin(){
  let isReg=false;const el=document.getElementById('app');
  function draw(){
    el.innerHTML=`<div class="login-page"><div class="login-box">
      <div class="login-logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Keygate</div>
      <div class="login-title">${isReg?'Create account':'Welcome back'}</div>
      <div class="login-sub">${isReg?'Start securing your agent credentials':'Sign in to your dashboard'}</div>
      <div id="err"></div>
      <form id="af">${isReg?'<div class="form-group"><label class="form-label">Name</label><input class="form-input" id="fn" placeholder="Your name"></div>':''}
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="fe" placeholder="you@company.com" required></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="fp" placeholder="Min. 8 characters" required minlength="8"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;margin-top:6px" id="sb">${isReg?'Create Account':'Sign In'}</button>
      </form>
      <div style="text-align:center;margin-top:14px;font-size:11px;color:var(--text-4)">${isReg?'Have an account?':'No account?'} <button onclick="isReg=!isReg;draw()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:11px">${isReg?'Sign in':'Create one'}</button></div>
    </div></div>`;
    document.getElementById('af').onsubmit=async(ev)=>{ev.preventDefault();S.user=D.user;S.demoMode=true;render()};
  }
  draw();
}

document.addEventListener('DOMContentLoaded',()=>render());
</script>
</body>
</html>
