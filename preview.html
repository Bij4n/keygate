<!DOCTYPE html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #09090b; --bg-raised: #111114; --bg-card: #18181b;
      --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);

    input, select, textarea, button { font-family: inherit; }

    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--bg-raised); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 10px; z-index: 10; }
    .logo { display: flex; align-items: center; gap: 8px; padding: 0 12px; margin-bottom: 28px; font-size: 17px; font-weight: 700; letter-spacing: -0.03em; cursor: pointer; }
    .nav { display: flex; flex-direction: column; gap: 1px; flex: 1; }
    .nav a { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: 8px; font-size: 13px; color: var(--text-3); cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .nav a:hover { color: var(--text-2); background: rgba(255,255,255,0.03); }
    .nav a.active { color: var(--text); background: rgba(255,255,255,0.05); font-weight: 500; }
    .nav a .badge-count { margin-left: auto; font-size: 11px; background: var(--accent-bg); color: var(--accent); padding: 1px 7px; border-radius: 10px; font-weight: 600; }
    .sidebar-footer { border-top: 1px solid var(--border); padding-top: 14px; }
    .user-row { display: flex; align-items: center; gap: 9px; padding: 8px 12px; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: white; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: var(--text-3); }
    .btn-logout { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 11px; margin-left: auto; padding: 4px 8px; border-radius: 4px; }
    .btn-logout:hover { color: var(--red); background: var(--red-bg); }

    main { flex: 1; margin-left: 220px; padding: 28px 32px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .page-header p { font-size: 14px; color: var(--text-2); }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 28px; }
    .stat { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
    .stat-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }

    /* Cards */
    .card { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .card-header h2 { font-size: 14px; font-weight: 600; }
    .card-body { padding: 18px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
    .btn-primary { background: var(--accent-2); color: white; }
    .btn-primary:hover { background: var(--accent); }
    .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red-border); }
    .btn-danger:hover { background: var(--red-bg); }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 16px; color: var(--text-3); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    td { padding: 10px 16px; border-bottom: 1px solid var(--border); color: var(--text-2); }
    tr:last-child td { border-bottom: none; }
    th:last-child, td:last-child { text-align: right; }

    /* Tags */
    .tag { display: inline-flex; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .tag-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .tag-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .tag-orange { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(251,146,60,0.15); }
    .tag-gray { background: rgba(255,255,255,0.04); color: var(--text-3); border: 1px solid var(--border); }
    .tag-accent { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
    .code-tag { font-family: 'SF Mono', monospace; font-size: 12px; padding: 2px 7px; border-radius: 4px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-2); }

    /* Connections grid */
    .conn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
    .conn-card { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; transition: border-color 0.15s; }
    .conn-card:hover { border-color: var(--border-hover); }
    .conn-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .conn-provider { display: flex; align-items: center; gap: 10px; }
    .conn-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .conn-name { font-weight: 500; font-size: 14px; }
    .conn-status { font-size: 11px; display: flex; align-items: center; gap: 4px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
    .conn-scopes { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .conn-actions { display: flex; gap: 6px; }
    .conn-actions .btn { flex: 1; justify-content: center; }

    /* Empty state */
    .empty { padding: 48px; text-align: center; color: var(--text-3); }
    .empty p:first-child { font-size: 14px; margin-bottom: 6px; color: var(--text-2); }

    /* Modal */
    .modal-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 18px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .modal-item { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: transparent; color: var(--text); font-size: 13px; font-weight: 500; }
    .modal-item:hover { border-color: var(--accent-border); background: var(--accent-bg); }
    .modal-icon { font-size: 18px; }

    /* Forms */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 5px; font-weight: 500; }
    .form-input { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
    .form-input:focus { border-color: var(--accent-border); }
    .form-select { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; outline: none; appearance: none; }

    /* Trust bar */
    .trust-bar { width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
    .trust-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

    /* Login */
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 380px; padding: 36px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 14px; }
    .login-logo { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 28px; font-size: 22px; font-weight: 700; }
    .login-title { font-size: 17px; font-weight: 600; text-align: center; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--text-2); text-align: center; margin-bottom: 22px; }
    .error-msg { padding: 9px 12px; border-radius: 8px; background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); font-size: 12px; margin-bottom: 14px; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      main { margin-left: 0; padding: 20px 16px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .conn-grid { grid-template-columns: 1fr; }
      .modal-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

async function api(p,o={}){
  const h={'Content-Type':'application/json',...(S.token?{Authorization:`Bearer ${S.token}`}:{})};
  const r=await fetch(p,{...o,headers:{...h,...o.headers}});
  if(r.status===401){S.token=null;S.user=null;localStorage.removeItem('kg_token');localStorage.removeItem('kg_user');render();throw new Error('Session expired');}
  const d=await r.json();if(!r.ok)throw new Error(d.error||d.message||'Failed');return d;
}

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;padding:14px">
    ${at.map(t=>`<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:default">
      <div style="font-size:22px;margin-bottom:6px">${t.i}</div>
      <div style="font-weight:600;font-size:13px;margin-bottom:3px">${t.n}</div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:6px;line-height:1.4">${t.d}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px">${t.p.map(p=>'<span class="tag tag-accent" style="font-size:9px">'+p+'</span>').join('')}</div>
      <div style="font-size:10px;color:var(--text-3)">TTL: ${t.t} · ${t.a} · Trust: ${t.s}</div>
    </div>`).join('')}</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="card"><div class="card-header"><h2>Policy Templates</h2></div>
      <table><thead><tr><th>Policy</th><th>Effect</th></tr></thead><tbody>
      ${pt.map(p=>`<tr><td>${p.i} <strong>${p.n}</strong><br><span style="font-size:11px;color:var(--text-3)">${p.d}</span></td><td><span class="tag ${et(p.e)}">${p.e}</span></td></tr>`).join('')}
      </tbody></table></div>
      <div class="card"><div class="card-header"><h2>Threat Scenarios</h2></div>
      <table><thead><tr><th>Threat</th><th>Severity</th></tr></thead><tbody>
      ${ts.map(t=>`<tr><td><strong>${t.n}</strong><br><span style="font-size:11px;color:var(--text-3)">${t.d}</span></td><td><span class="tag ${st(t.s)}">${t.s}</span></td></tr>`).join('')}
      </tbody></table></div>
    </div>`;
}

function renderWebhooks(){
  const wh = S.webhooks || [];
  return`<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Webhooks</h1><p>Get notified when anomalies or events occur</p></div><button class="btn btn-primary" onclick="S.modal='webhook';render()">+ Add Webhook</button></div>
    ${wh.length===0?'<div class="empty"><p>No webhooks configured</p><p style="font-size:12px">Add a webhook to receive Slack, Discord, or JSON notifications</p></div>':
    '<div class="card"><table><thead><tr><th>URL</th><th>Format</th><th>Events</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+
    wh.map(w=>`<tr>
      <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${w.url}</td>
      <td><span class="tag tag-accent">${w.format}</span></td>
      <td>${w.events.map(e=>'<span class="tag tag-gray" style="font-size:10px;margin:1px">'+e+'</span>').join('')}</td>
      <td>${w.enabled?'<span class="tag tag-green">Active</span>':'<span class="tag tag-gray">Disabled</span>'}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteWebhook('${w.id}')">Delete</button></td>
    </tr>`).join('')+'</tbody></table></div>'}`;
}

function renderSiem(){
  const integrations = S.siemIntegrations || [];
  return`<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>SIEM Integrations</h1><p>Export audit events to your security stack</p></div><button class="btn btn-primary" onclick="S.modal='siem';render()">+ Add Integration</button></div>
    <div class="stats" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat" style="text-align:center;padding:16px 8px;cursor:pointer" onclick="S.modal='siem';S.siemType='datadog';render()"><div style="font-size:20px;margin-bottom:4px">📊</div><div class="stat-label">Datadog</div></div>
      <div class="stat" style="text-align:center;padding:16px 8px;cursor:pointer" onclick="S.modal='siem';S.siemType='splunk';render()"><div style="font-size:20px;margin-bottom:4px">🔍</div><div class="stat-label">Splunk</div></div>
      <div class="stat" style="text-align:center;padding:16px 8px;cursor:pointer" onclick="S.modal='siem';S.siemType='elastic';render()"><div style="font-size:20px;margin-bottom:4px">🔎</div><div class="stat-label">Elastic</div></div>
      <div class="stat" style="text-align:center;padding:16px 8px;cursor:pointer" onclick="S.modal='siem';S.siemType='syslog';render()"><div style="font-size:20px;margin-bottom:4px">📋</div><div class="stat-label">Syslog</div></div>
      <div class="stat" style="text-align:center;padding:16px 8px;cursor:pointer" onclick="S.modal='siem';S.siemType='webhook';render()"><div style="font-size:20px;margin-bottom:4px">🔗</div><div class="stat-label">Webhook</div></div>
    </div>
    ${integrations.length===0?'<div class="empty" style="margin-top:16px"><p>No SIEM integrations configured</p><p style="font-size:12px">Click a provider above to export audit events</p></div>':
    '<div class="card" style="margin-top:16px"><table><thead><tr><th>Type</th><th>Endpoint</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+
    integrations.map(s=>`<tr>
      <td><span class="tag tag-accent">${s.type}</span></td>
      <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.endpoint}</td>
      <td>${s.enabled?'<span class="tag tag-green">Active</span>':'<span class="tag tag-gray">Disabled</span>'}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteSiem('${s.id}')">Delete</button></td>
    </tr>`).join('')+'</tbody></table></div>'}`;
}

function renderSettings(){
  return`<div class="page-header"><h1>Settings</h1><p>Manage your account and API keys</p></div>
    <div style="display:grid;gap:10px">
      <div class="card"><div class="card-header"><h2>Profile</h2></div><div class="card-body">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
          <div class="avatar" style="width:48px;height:48px;font-size:18px">${(S.user?.name||S.user?.email||'??').slice(0,2).toUpperCase()}</div>
          <div><div style="font-weight:600">${S.user?.name||S.user?.email}</div><div style="font-size:13px;color:var(--text-3)">${S.user?.email}</div></div>
        </div>
        <div style="font-size:13px;color:var(--text-2)">Role: <span class="tag tag-accent">${S.user?.role||'member'}</span></div>
      </div></div>
      <div class="card"><div class="card-header"><h2>API Keys</h2><button class="btn btn-sm btn-primary" onclick="S.modal='genkey';render()">+ Generate Key</button></div><div class="card-body">
        <p style="font-size:13px;color:var(--text-2)">API keys allow your agents and the SDK to authenticate with Keygate programmatically.</p>
      </div></div>
      <div class="card"><div class="card-header"><h2>Danger Zone</h2></div><div class="card-body">
        <button class="btn btn-danger" onclick="logout()">Sign Out</button>
      </div></div>
    </div>`;
}

function renderModal(){
  if(!S.modal)return'';
  if(S.modal==='connect'){
    const provs=['github','gmail','slack','notion','google_drive','calendar','jira','salesforce','hubspot','stripe'];
    return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;render()}"><div class="modal"><h3>Connect a Service</h3><div class="modal-grid">${provs.map(p=>`<button class="modal-item" onclick="addConn('${p}')"><span class="modal-icon">${E[p]}</span>${pn(p)}</button>`).join('')}</div></div></div>`;
  }
  if(S.modal==='token'&&S.tokenResult){
    return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;S.tokenResult=null;render()}"><div class="modal"><h3>Token Issued</h3><p style="font-size:13px;color:var(--text-2);margin-bottom:14px">A scoped token has been created.</p><div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px"><pre style="font-size:12px;color:var(--text-2);white-space:pre-wrap;word-break:break-all;margin:0">${JSON.stringify(S.tokenResult,null,2)}</pre></div><p style="font-size:11px;color:var(--text-3);margin-top:10px">Expires: ${S.tokenResult.expiresAt?new Date(S.tokenResult.expiresAt).toLocaleString():'N/A'}</p></div></div>`;
  }
  if(S.modal==='apikey'&&S.tokenResult){
    return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;S.tokenResult=null;render()}"><div class="modal"><h3>API Key Created</h3><p style="font-size:13px;color:var(--text-2);margin-bottom:14px">Copy this key now — it won't be shown again.</p><div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px"><code style="font-size:12px;color:var(--green);word-break:break-all">${S.tokenResult.key}</code></div></div></div>`;
  }
  if(S.modal==='agent'){
    return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;render()}"><div class="modal"><h3>Register Agent</h3><form onsubmit="event.preventDefault();registerAgent(document.getElementById('an').value,document.getElementById('ad').value)">
      <div class="form-group"><label class="form-label">Agent Name</label><input class="form-input" id="an" placeholder="e.g. coding-assistant" required></div>
      <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="ad" placeholder="What does this agent do?"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Register Agent</button>
    </form></div></div>`;
  }
  if(S.modal==='policy'){
    return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;render()}"><div class="modal"><h3>Create Policy</h3><form onsubmit="event.preventDefault();const e=document.getElementById('pe').value;const conds=[];const ct=document.getElementById('pct').value;if(ct==='scope_action')conds.push({type:'scope_action',actions:[document.getElementById('pca').value]});if(ct==='provider')conds.push({type:'provider',providers:[document.getElementById('pcp').value]});createPolicy(document.getElementById('pn').value,e,conds)">
      <div class="form-group"><label class="form-label">Policy Name</label><input class="form-input" id="pn" placeholder="e.g. No write access" required></div>
      <div class="form-group"><label class="form-label">Effect</label><select class="form-select" id="pe"><option value="deny">Deny</option><option value="require_approval">Require Approval</option><option value="allow">Allow</option></select></div>
      <div class="form-group"><label class="form-label">Condition Type</label><select class="form-select" id="pct"><option value="scope_action">Scope Action</option><option value="provider">Provider</option></select></div>
      <div class="form-group"><label class="form-label">Value</label><input class="form-input" id="pca" placeholder="write, delete, or admin"><input class="form-input" id="pcp" placeholder="github, gmail, etc." style="margin-top:4px"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Create Policy</button>
    </form></div></div>`;
  }
  if(S.modal==='genkey'){
    return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;render()}"><div class="modal"><h3>Generate API Key</h3><form onsubmit="event.preventDefault();genApiKey(document.getElementById('kn').value)">
      <div class="form-group"><label class="form-label">Key Name</label><input class="form-input" id="kn" placeholder="e.g. production-agent" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Generate</button>
    </form></div></div>`;
  }
  if(S.modal==='webhook'){
    return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;render()}"><div class="modal"><h3>Add Webhook</h3><form onsubmit="event.preventDefault();const evts=[];document.querySelectorAll('.wh-evt:checked').forEach(c=>evts.push(c.value));addWebhook(document.getElementById('whu').value,document.getElementById('whf').value,evts)">
      <div class="form-group"><label class="form-label">URL</label><input class="form-input" id="whu" type="url" placeholder="https://hooks.slack.com/services/..." required></div>
      <div class="form-group"><label class="form-label">Format</label><select class="form-select" id="whf"><option value="slack">Slack</option><option value="discord">Discord</option><option value="json">JSON</option></select></div>
      <div class="form-group"><label class="form-label">Events</label><div style="display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--text-2)">
        <label><input type="checkbox" class="wh-evt" value="anomaly.detected" checked> Anomaly detected</label>
        <label><input type="checkbox" class="wh-evt" value="token.denied" checked> Token denied</label>
        <label><input type="checkbox" class="wh-evt" value="agent.suspended"> Agent suspended</label>
        <label><input type="checkbox" class="wh-evt" value="token.revoked"> Token revoked</label>
        <label><input type="checkbox" class="wh-evt" value="connection.revoked"> Connection revoked</label>
      </div></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Add Webhook</button>
    </form></div></div>`;
  }
  if(S.modal==='siem'){
    const type = S.siemType || 'datadog';
    const labels = {datadog:'Datadog',splunk:'Splunk HEC',elastic:'Elasticsearch',syslog:'Syslog',webhook:'Webhook'};
    const placeholders = {datadog:'https://http-intake.logs.datadoghq.com/v1/input',splunk:'https://your-splunk:8088/services/collector',elastic:'https://your-elastic:9200',syslog:'https://your-syslog-endpoint',webhook:'https://your-endpoint.com/events'};
    return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;render()}"><div class="modal"><h3>Add ${labels[type]||type} Integration</h3><form onsubmit="event.preventDefault();addSiem('${type}',document.getElementById('se').value,document.getElementById('sk').value)">
      <div class="form-group"><label class="form-label">Endpoint URL</label><input class="form-input" id="se" type="url" placeholder="${placeholders[type]||''}" required></div>
      <div class="form-group"><label class="form-label">API Key (optional)</label><input class="form-input" id="sk" type="password" placeholder="Your ${labels[type]||''} API key"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Connect ${labels[type]||type}</button>
    </form></div></div>`;
  }
  return'';
}

function render(){
  if(!S.token&&!S.demoMode){renderLogin();return;}
  if(!S.user) S.user = DEMO.user;
  const alertCount=S.alerts?.unacknowledged||0;
  const pendingCount=S.approvals?.stats?.pending||0;
  const pages={dashboard:renderDashboard,connections:renderConnections,tokens:renderTokens,audit:renderAudit,agents:renderAgents,policies:renderPolicies,registry:renderRegistry,templates:renderTemplates,webhooks:renderWebhooks,siem:renderSiem,settings:renderSettings};
  const content=(pages[S.page]||renderDashboard)();
  const initials=(S.user.name||S.user.email||'??').slice(0,2).toUpperCase();

  document.getElementById('app').innerHTML=`<div class="app">
    <aside class="sidebar">
      <div class="logo" onclick="S.page='dashboard';render()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Keygate</div>
      <nav class="nav">
        ${navItem('📊','Dashboard','dashboard')}
        ${navItem('🔗','Connections','connections')}
        ${navItem('🔑','Tokens','tokens')}
        ${navItem('📜','Audit Log','audit')}
        ${navItem('🤖','Agents','agents')}
        ${navItem('📋','Policies','policies')}
        ${navItem('🛡️','MCP Registry','registry')}
        ${navItem('📦','Templates','templates')}
        ${navItem('🔔','Webhooks','webhooks')}
        ${navItem('📡','SIEM','siem')}
        ${navItem('⚙️','Settings','settings')}
      </nav>
      ${S.demoMode?'<div style="padding:8px 12px;margin-bottom:8px"><div style="font-size:11px;color:var(--orange);background:var(--orange-bg);border:1px solid rgba(251,146,60,0.15);border-radius:6px;padding:6px 10px;text-align:center">Demo Mode</div></div>':''}
      <div style="padding:4px 12px 8px"><a href="/docs.html" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);text-decoration:none">📖 Documentation</a></div>
      <div class="sidebar-footer"><div class="user-row"><div class="avatar">${initials}</div><div><div class="user-name">${S.user.name||S.user.email}</div><div class="user-role">${S.user.role}</div></div><button class="btn-logout" onclick="logout()">Out</button></div></div>
    </aside>
    <main>${content}</main>
  </div>${renderModal()}`;
}

document.addEventListener('DOMContentLoaded',()=>{
  render();
  if(S.token&&!S.demoMode){load().catch(()=>{S.token=null;S.demoMode=true;S.user=DEMO.user;S.connections=DEMO.connections;S.audit=DEMO.audit;S.summary=DEMO.summary;render();});}
});
</script>
</body>
</html>
