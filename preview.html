<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keygate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-card: #1a1a25;
      --bg-card-hover: #22222f; --border: #2a2a3a; --text-primary: #e8e8f0;
      --text-secondary: #8888a0; --text-muted: #5a5a70; --accent: #6366f1;
      --accent-hover: #7577f5; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
    }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: system-ui, -apple-system, sans-serif; }
    input { font-family: inherit; }
    button { font-family: inherit; }

    /* Login */
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 400px; padding: 40px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; }
    .login-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 32px; }
    .login-logo span { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    .login-title { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 8px; }
    .login-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; outline: none; }
    .form-group input:focus { border-color: var(--accent); }
    .btn-primary { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.7; cursor: wait; }
    .error-msg { padding: 10px 14px; border-radius: 8px; background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: var(--danger); font-size: 13px; margin-bottom: 16px; }
    .switch-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
    .switch-link button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; }

    /* Dashboard layout */
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 12px; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 12px; margin-bottom: 32px; }
    .sidebar-logo span { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; text-decoration: none; font-size: 14px; color: var(--text-secondary); cursor: pointer; }
    .nav a:hover { background: var(--bg-card); }
    .nav a.active { color: var(--text-primary); background: var(--bg-card); font-weight: 500; }
    .sidebar-footer { border-top: 1px solid var(--border); padding-top: 16px; display: flex; align-items: center; justify-content: space-between; padding: 16px 12px 0; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-role { font-size: 11px; color: var(--text-muted); }
    .btn-logout { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; }
    .btn-logout:hover { color: var(--danger); }

    main { flex: 1; margin-left: 240px; padding: 32px; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
    .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }

    /* Section */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-title { font-size: 16px; font-weight: 500; }
    .btn-connect { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-connect:hover { background: var(--accent-hover); }

    /* Connections */
    .connections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 40px; }
    .connection-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.15s; }
    .connection-card:hover { border-color: #4a4a6a; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .card-provider { display: flex; align-items: center; gap: 12px; }
    .card-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .provider-name { font-weight: 500; font-size: 15px; }
    .provider-status { font-size: 11px; display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .scopes { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .scope-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--bg-primary); color: var(--text-secondary); border: 1px solid var(--border); }
    .card-actions { margin-top: 12px; display: flex; gap: 8px; }
    .btn-manage { flex: 1; padding: 6px 12px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; }
    .btn-revoke { padding: 6px 12px; font-size: 12px; border-radius: 6px; border: 1px solid var(--danger); background: transparent; color: var(--danger); cursor: pointer; }
    .btn-revoke:hover { background: rgba(239,68,68,0.1); }

    /* Activity */
    .activity-table { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .activity-table table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .activity-table th { text-align: left; padding: 12px 16px; color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    .activity-table th:last-child { text-align: right; }
    .activity-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
    .activity-table td:last-child { text-align: right; color: var(--text-muted); }
    .activity-table tr:last-child td { border-bottom: none; }
    .agent-tag { font-family: monospace; font-size: 12px; padding: 2px 6px; border-radius: 4px; background: var(--bg-primary); border: 1px solid var(--border); }

    .empty-state { padding: 40px; text-align: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; color: var(--text-muted); }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 480px; max-height: 80vh; overflow-y: auto; }
    .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    .provider-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .provider-item { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: transparent; color: var(--text-primary); font-size: 14px; }
    .provider-item:hover { border-color: var(--accent); background: rgba(99,102,241,0.05); }
    .provider-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; font-size: 16px; }

    /* Token modal */
    .token-result { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 16px; }
    .token-result pre { font-size: 12px; color: var(--text-secondary); white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const API = '';
const providerEmojis = { github: '🐙', gmail: '📧', slack: '💬', notion: '📝', google_drive: '📁', calendar: '📅', jira: '📋', salesforce: '☁️', hubspot: '👥', stripe: '💳', custom: '🔧' };
const actionColors = { 'token.issued': 'var(--accent)', 'token.resolved': 'var(--success)', 'token.denied': 'var(--danger)', 'token.expired': 'var(--warning)', 'token.revoked': 'var(--text-muted)', 'tokens.revoked_all': 'var(--danger)' };

let state = { token: localStorage.getItem('kg_token'), user: JSON.parse(localStorage.getItem('kg_user') || 'null'), view: 'dashboard', connections: [], audit: [], summary: null, showModal: null, showTokenModal: null, tokenResult: null };

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}) };
  const res = await fetch(`${API}${path}`, { ...opts, headers: { ...headers, ...opts.headers } });
  if (res.status === 401) {
    state.token = null; state.user = null;
    localStorage.removeItem('kg_token'); localStorage.removeItem('kg_user');
    render();
    throw new Error('Session expired');
  }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
  return data;
}

function formatTime(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now'; if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
  return new Date(ts).toLocaleDateString();
}

async function loadDashboard() {
  try {
    const [conns, auditData, summaryData] = await Promise.all([
      api('/api/connections'), api('/api/audit?limit=10'), api('/api/audit/summary')
    ]);
    state.connections = conns.connections;
    state.audit = auditData.entries;
    state.summary = summaryData;
  } catch (e) { console.error(e); }
  render();
}

async function handleLogin(email, password) {
  const data = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
  state.token = data.token; state.user = data.user;
  localStorage.setItem('kg_token', data.token);
  localStorage.setItem('kg_user', JSON.stringify(data.user));
  loadDashboard();
}

async function handleRegister(email, password, name) {
  const data = await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ email, password, name: name || undefined }) });
  state.token = data.token; state.user = data.user;
  localStorage.setItem('kg_token', data.token);
  localStorage.setItem('kg_user', JSON.stringify(data.user));
  loadDashboard();
}

function logout() {
  state.token = null; state.user = null; state.connections = []; state.audit = []; state.summary = null;
  localStorage.removeItem('kg_token'); localStorage.removeItem('kg_user');
  render();
}

async function addConnection(provider) {
  const providerScopes = { github: ['repo:read','read:user'], gmail: ['gmail.readonly'], slack: ['channels:read'], notion: ['read_content'], google_drive: ['drive.readonly'], calendar: ['calendar.readonly'], jira: ['read:jira-work'], salesforce: ['api'], hubspot: ['crm.objects.contacts.read'], stripe: ['read_only'] };
  try {
    await api('/api/connections', { method: 'POST', body: JSON.stringify({ provider, scopes: providerScopes[provider] || ['read'] }) });
    state.showModal = null;
    await loadDashboard();
  } catch (e) { alert(e.message); }
}

async function revokeConnection(id) {
  if (!confirm('Revoke this connection and all its tokens?')) return;
  try { await api(`/api/connections/${id}`, { method: 'DELETE' }); await loadDashboard(); } catch (e) { alert(e.message); }
}

async function issueToken(connectionId) {
  try {
    const result = await api('/api/tokens/issue', { method: 'POST', body: JSON.stringify({ connectionId, agentId: 'demo-agent', scopes: [{ resource: 'data', actions: ['read'] }], ttl: 3600 }) });
    state.tokenResult = result;
    state.showTokenModal = connectionId;
    render();
    await loadDashboard();
  } catch (e) { alert(e.message); }
}

function renderLogin() {
  let isRegister = false;
  const el = document.getElementById('app');
  function draw() {
    el.innerHTML = `
      <div class="login-page"><div class="login-card">
        <div class="login-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Keygate</span>
        </div>
        <div class="login-title">${isRegister ? 'Create your account' : 'Welcome back'}</div>
        <div class="login-subtitle">${isRegister ? 'Start securing your agent credentials' : 'Sign in to manage your connections'}</div>
        <div id="login-error"></div>
        <form id="auth-form">
          ${isRegister ? '<div class="form-group"><label>Name</label><input type="text" id="name" placeholder="Your name"></div>' : ''}
          <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" required></div>
          <div class="form-group" style="margin-bottom:24px"><label>Password</label><input type="password" id="password" placeholder="Min. 8 characters" required minlength="8"></div>
          <button type="submit" class="btn-primary" id="submit-btn">${isRegister ? 'Create Account' : 'Sign In'}</button>
        </form>
        <div class="switch-link">${isRegister ? 'Already have an account?' : "Don't have an account?"} <button id="switch-btn">${isRegister ? 'Sign in' : 'Create one'}</button></div>
      </div></div>`;
    document.getElementById('switch-btn').onclick = () => { isRegister = !isRegister; draw(); };
    document.getElementById('auth-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Please wait...';
      try {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (isRegister) { const name = document.getElementById('name')?.value; await handleRegister(email, password, name); }
        else { await handleLogin(email, password); }
      } catch (err) {
        document.getElementById('login-error').innerHTML = `<div class="error-msg">${err.message}</div>`;
        btn.disabled = false; btn.textContent = isRegister ? 'Create Account' : 'Sign In';
      }
    };
  }
  draw();
}

function render() {
  if (!state.token || !state.user) { renderLogin(); return; }
  const s = state.summary || {};
  const initials = (state.user.name || state.user.email || '??').slice(0,2).toUpperCase();

  let connectionsHtml = '';
  if (state.connections.length === 0) {
    connectionsHtml = '<div class="empty-state"><p style="font-size:15px;margin-bottom:8px">No connections yet</p><p style="font-size:13px">Click "+ Connect Service" to get started</p></div>';
  } else {
    connectionsHtml = '<div class="connections-grid">' + state.connections.map(c => {
      const emoji = providerEmojis[c.provider] || '🔧';
      const name = c.provider.replace(/_/g,' ').replace(/\b\w/g,x=>x.toUpperCase());
      const sc = c.status === 'active' ? 'var(--success)' : c.status === 'revoked' ? 'var(--danger)' : 'var(--text-muted)';
      return `<div class="connection-card">
        <div class="card-header"><div class="card-provider"><div class="card-icon">${emoji}</div><div><div class="provider-name">${name}</div><div class="provider-status" style="color:${sc}"><span class="status-dot" style="background:${sc}"></span>${c.status}</div></div></div></div>
        <div class="scopes">${c.scopes.map(s=>`<span class="scope-tag">${s}</span>`).join('')}</div>
        <div class="card-actions">
          <button class="btn-manage" onclick="issueToken('${c.id}')">Issue Token</button>
          <button class="btn-revoke" onclick="revokeConnection('${c.id}')">Revoke</button>
        </div></div>`;
    }).join('') + '</div>';
  }

  let auditHtml = '';
  if (state.audit.length === 0) {
    auditHtml = '<div class="empty-state"><p style="font-size:15px;margin-bottom:8px">No activity yet</p><p style="font-size:13px">Token events will appear here</p></div>';
  } else {
    auditHtml = `<div class="activity-table"><table><thead><tr><th>Event</th><th>Agent</th><th>Service</th><th>Status</th><th style="text-align:right">Time</th></tr></thead><tbody>
    ${state.audit.map(e => {
      const color = actionColors[e.action] || 'var(--text-secondary)';
      return `<tr><td><span style="color:${color}">${e.action}</span></td><td><span class="agent-tag">${e.agentId}</span></td><td>${e.provider}</td><td><span style="color:${e.success?'var(--success)':'var(--danger)'}">${e.success?'success':'failed'}</span></td><td>${formatTime(e.timestamp)}</td></tr>`;
    }).join('')}</tbody></table></div>`;
  }

  let modalHtml = '';
  if (state.showModal === 'connect') {
    const providers = ['github','gmail','slack','notion','google_drive','calendar','jira','salesforce','hubspot','stripe'];
    modalHtml = `<div class="modal-overlay" onclick="if(event.target===this){state.showModal=null;render()}"><div class="modal">
      <h3>Connect a Service</h3>
      <div class="provider-list">${providers.map(p => {
        const name = p.replace(/_/g,' ').replace(/\b\w/g,x=>x.toUpperCase());
        return `<button class="provider-item" onclick="addConnection('${p}')"><div class="provider-icon">${providerEmojis[p]}</div>${name}</button>`;
      }).join('')}</div>
    </div></div>`;
  }

  if (state.showTokenModal) {
    const r = state.tokenResult;
    modalHtml = `<div class="modal-overlay" onclick="if(event.target===this){state.showTokenModal=null;state.tokenResult=null;render()}"><div class="modal">
      <h3>Token Issued</h3>
      <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">A scoped token has been issued for this connection.</p>
      <div class="token-result"><pre>${JSON.stringify(r, null, 2)}</pre></div>
      <p style="color:var(--text-muted);font-size:12px;margin-top:12px">This token expires at ${r?.expiresAt ? new Date(r.expiresAt).toLocaleTimeString() : 'N/A'}. Use the reference to resolve the actual access token.</p>
    </div></div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Keygate</span></div>
        <nav class="nav">
          <a class="active" onclick="">📊 Dashboard</a>
          <a onclick="">🔗 Connections</a>
          <a onclick="">🔑 Tokens</a>
          <a onclick="">📜 Audit Log</a>
          <a onclick="">👥 Team</a>
          <a onclick="">⚙️ Settings</a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info"><div class="avatar">${initials}</div><div><div class="user-name">${state.user.name || state.user.email}</div><div class="user-role">${state.user.role}</div></div></div>
          <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
      </aside>
      <main>
        <header><h1>Connections</h1><p class="subtitle">Manage service access for your AI agents</p></header>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-header"><span class="stat-label">Active Connections</span></div><div class="stat-value">${s.activeConnections||0}</div></div>
          <div class="stat-card"><div class="stat-header"><span class="stat-label">Tokens Issued</span></div><div class="stat-value">${s.tokensIssued||0}</div></div>
          <div class="stat-card"><div class="stat-header"><span class="stat-label">Events (24h)</span></div><div class="stat-value">${s.last24h?.requests||0}</div></div>
          <div class="stat-card"><div class="stat-header"><span class="stat-label">Agents</span></div><div class="stat-value">${s.uniqueAgents||0}</div></div>
        </div>
        <div class="section-header"><h2 class="section-title">Active Connections</h2><button class="btn-connect" onclick="state.showModal='connect';render()">+ Connect Service</button></div>
        ${connectionsHtml}
        <h2 class="section-title" style="margin-bottom:16px">Recent Activity</h2>
        ${auditHtml}
      </main>
    </div>
    ${modalHtml}`;
}

// Init — wrap in DOMContentLoaded and add error recovery
document.addEventListener('DOMContentLoaded', () => {
  if (state.token) {
    // Clear any stale data and show login immediately, then try to load
    render();
    loadDashboard().catch(() => {
      state.token = null; state.user = null;
      localStorage.removeItem('kg_token'); localStorage.removeItem('kg_user');
      render();
    });
  } else {
    render();
  }
});
</script>
</body>
</html>
