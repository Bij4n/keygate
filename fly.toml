# Fly.io deployment config
# Deploy: fly launch --name keygate && fly deploy

app = "keygate"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "3100"
  NODE_ENV = "production"
