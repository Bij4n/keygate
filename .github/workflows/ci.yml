name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Run tests
        run: npm test --workspace=packages/core

      - name: Type check server
        run: npx tsc --noEmit --project packages/server/tsconfig.json || true

      - name: Type check SDK
        run: npx tsc --noEmit --project packages/sdk/tsconfig.json || true

      - name: Type check MCP
        run: npx tsc --noEmit --project packages/mcp/tsconfig.json || true
