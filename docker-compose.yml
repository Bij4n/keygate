services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keygate
      POSTGRES_USER: keygate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keygate_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  keygate:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://keygate:${POSTGRES_PASSWORD:-keygate_dev}@postgres:5432/keygate
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
